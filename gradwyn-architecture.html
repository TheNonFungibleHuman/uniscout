<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradwyn — Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#020a16;
  --surface:#06111f;
  --surface2:#0a1a2e;
  --border:rgba(255,255,255,0.07);
  --text:#dde4ef;
  --muted:#4a607a;
  --c-build:#818cf8;
  --c-entry:#a78bfa;
  --c-core:#f43f5e;
  --c-view:#3b82f6;
  --c-student:#06b6d4;
  --c-mentor:#a855f7;
  --c-component:#10b981;
  --c-service:#f59e0b;
  --c-config:#64748b;
  --c-external:#22c55e;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(99,102,241,0.12) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;z-index:0}

/* HEADER */
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:rgba(2,10,22,0.9);backdrop-filter:blur(12px);flex-shrink:0}
.logo-mark{width:32px;height:32px;background:var(--c-core);display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;font-weight:bold;font-size:17px;color:#fff;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:14px}
h1{font-size:17px;font-weight:800;letter-spacing:-0.3px}
h1 em{color:var(--muted);font-style:normal;font-weight:600}
.legend{display:flex;gap:14px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.li-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.hint{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;opacity:0.6}

/* MAIN LAYOUT */
.workspace{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}

/* DIAGRAM SCROLL AREA */
.scroll-area{flex:1;overflow:auto;padding:32px 40px;position:relative}
.scroll-area::-webkit-scrollbar{width:6px;height:6px}
.scroll-area::-webkit-scrollbar-track{background:transparent}
.scroll-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* CANVAS */
#canvas{position:relative;width:1280px;height:950px}
#svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* TIER LABELS */
.tier-tag{position:absolute;left:-28px;font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);font-family:'JetBrains Mono',monospace;writing-mode:vertical-lr;transform:rotate(180deg);transform-origin:center center;opacity:0.45;user-select:none}

/* TIER DIVIDERS */
.tier-line{position:absolute;left:-8px;right:0;height:1px;background:var(--border);z-index:0}

/* FLOW GROUP BRACKETS */
.flow-group{position:absolute;border:1px dashed;border-radius:6px;pointer-events:none;z-index:0}
.flow-group-label{position:absolute;top:-11px;left:12px;font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;padding:1px 7px;border-radius:3px}

/* NODES */
.node{position:absolute;width:160px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--nc,#6366f1);border-radius:3px;padding:9px 12px 8px;transition:background 0.15s,transform 0.15s,box-shadow 0.15s;z-index:2;user-select:none}
.node:hover{background:var(--surface2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 0 1px var(--nc)}
.node.active{background:var(--surface2);box-shadow:0 0 0 1.5px var(--nc),0 6px 30px rgba(0,0,0,0.6);transform:translateY(-2px)}
.node.wide{width:200px}
.node-badge{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--nc);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;opacity:0.85}
.node-name{font-size:11.5px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-sub{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3;font-family:'Syne',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node.external{border-style:dashed dashed dashed solid}

/* DETAIL PANEL */
#panel{width:310px;min-width:310px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;transition:width 0.2s,min-width 0.2s;flex-shrink:0}
#panel.closed{width:0;min-width:0;border:none;overflow:hidden}
#panel::-webkit-scrollbar{width:4px}
#panel::-webkit-scrollbar-thumb{background:var(--border)}
.panel-top{padding:20px;border-bottom:1px solid var(--border);position:relative}
.panel-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:2px 5px;border-radius:3px;transition:color 0.1s,background 0.1s}
.panel-close:hover{color:var(--text);background:var(--surface2)}
.panel-filepath{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:7px;word-break:break-all}
.panel-title{font-size:16px;font-weight:800;margin-bottom:8px}
.panel-typebadge{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:2px 8px;border-radius:3px;display:inline-block}
.panel-body{padding:20px;flex:1}
.section-head{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:8px;margin-top:18px}
.section-head:first-child{margin-top:0}
.panel-desc{font-size:12px;color:#94a3b8;line-height:1.6}
.conn-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted)}
.conn-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.conn-dir{font-size:10px;opacity:0.7}
.conn-name{flex:1}
.empty-state{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);opacity:0.5;padding:12px 0}

/* CONNECTION LINE ANIMATION */
.conn-path{stroke-dasharray:6 3;animation:dash 0.5s linear infinite;animation-play-state:paused}
.conn-path.flowing{animation-play-state:running}
@keyframes dash{to{stroke-dashoffset:-9}}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">G</div>
    <h1>Gradwyn <em>/ Architecture Map</em></h1>
  </div>
  <div class="legend">
    <div class="li"><div class="li-dot" style="background:var(--c-build)"></div>Build Config</div>
    <div class="li"><div class="li-dot" style="background:var(--c-entry)"></div>Entry</div>
    <div class="li"><div class="li-dot" style="background:var(--c-core)"></div>App Core</div>
    <div class="li"><div class="li-dot" style="background:var(--c-view)"></div>Views</div>
    <div class="li"><div class="li-dot" style="background:var(--c-student)"></div>Student Flow</div>
    <div class="li"><div class="li-dot" style="background:var(--c-mentor)"></div>Mentor Flow</div>
    <div class="li"><div class="li-dot" style="background:var(--c-component)"></div>Components</div>
    <div class="li"><div class="li-dot" style="background:var(--c-service)"></div>Services</div>
    <div class="li"><div class="li-dot" style="background:var(--c-config)"></div>Config / Types</div>
    <div class="li"><div class="li-dot" style="background:var(--c-external)"></div>External API</div>
  </div>
  <span class="hint">click a node to inspect</span>
</header>

<div class="workspace">
  <div class="scroll-area">
    <div id="canvas">
      <svg id="svg-overlay"></svg>
    </div>
  </div>
  <div id="panel" class="closed">
    <div class="panel-top">
      <button class="panel-close" id="panel-close">✕</button>
      <div class="panel-filepath" id="p-path"></div>
      <div class="panel-title" id="p-title"></div>
      <span class="panel-typebadge" id="p-badge"></span>
    </div>
    <div class="panel-body">
      <div class="section-head">Purpose</div>
      <p class="panel-desc" id="p-desc"></p>
      <div class="section-head" id="p-deps-head">Dependencies</div>
      <div id="p-deps"></div>
      <div class="section-head" id="p-conn-head">Connections</div>
      <div id="p-conn"></div>
    </div>
  </div>
</div>

<script>
const TC = {
  build:     { hex:'#818cf8', label:'Build Config'    },
  entry:     { hex:'#a78bfa', label:'Entry Point'     },
  core:      { hex:'#f43f5e', label:'App Core'        },
  view:      { hex:'#3b82f6', label:'View / Page'     },
  student:   { hex:'#06b6d4', label:'Student Flow'    },
  mentor:    { hex:'#a855f7', label:'Mentor Flow'     },
  component: { hex:'#10b981', label:'UI Component'    },
  service:   { hex:'#f59e0b', label:'Service'         },
  config:    { hex:'#64748b', label:'Config / Types'  },
  external:  { hex:'#22c55e', label:'External API'    },
};

// x,y = top-left. w defaults 160, h defaults 57
const NODES = [
  // ─ TIER 0: BUILD CONFIG ─────────────────────────── y=22
  { id:'pkg',      label:'package.json',    file:'package.json',               type:'build',    x:30,  y:22,
    sub:'deps & scripts',
    detail:'Defines all npm packages (React 19, Firebase 12, @google/genai, react-markdown), devDependencies (Vite 6, TypeScript 5.8), and scripts: dev, build, preview, lint.' },
  { id:'tsconfig', label:'tsconfig.json',   file:'tsconfig.json',              type:'build',    x:210, y:22,
    sub:'TypeScript config',
    detail:'Compiler settings: strict mode, JSX transform for React, module resolution, path aliases, and ES2020 target.' },
  { id:'vite',     label:'vite.config.ts',  file:'vite.config.ts',             type:'build',    x:390, y:22,
    sub:'bundler config',
    detail:'Registers the Vite React plugin. Exposes env vars (GEMINI_API_KEY, FIREBASE_*) to the app as process.env at build time.' },
  { id:'env',      label:'.env.example',    file:'.env.example',               type:'build',    x:570, y:22,
    sub:'env var template',
    detail:'Template for .env.local. Lists all required keys: GEMINI_API_KEY, FIREBASE_API_KEY, FIREBASE_AUTH_DOMAIN, FIREBASE_PROJECT_ID, FIREBASE_STORAGE_BUCKET, FIREBASE_MESSAGING_SENDER_ID, FIREBASE_APP_ID, FIREBASE_FIRESTORE_DATABASE_ID.' },
  { id:'fsrules',  label:'firestore.rules', file:'firestore.rules',            type:'build',    x:750, y:22,
    sub:'security rules',
    detail:'Deployed to Firebase. Enforces strict owner-only access: /users/{userId} can only be read/written by the authenticated owner. Validates required fields (id, email, role) on document create.' },

  // ─ TIER 1: ENTRY ─────────────────────────────────── y=130
  { id:'html',     label:'index.html',      file:'index.html',                 type:'entry',    x:450, y:130,
    sub:'HTML shell',
    detail:'Vite HTML entry point. Defines <div id="root"> as the React mount target, loads Google Fonts (Playfair Display + DM Sans), and references index.tsx as the ES module entry.' },
  { id:'main',     label:'index.tsx',       file:'index.tsx',                  type:'entry',    x:650, y:130,
    sub:'React 19 mount',
    detail:'Calls ReactDOM.createRoot() on #root and mounts <App />. This is the root of the entire React component tree.' },

  // ─ TIER 2: CORE ──────────────────────────────────── y=235
  { id:'app',      label:'App.tsx',         file:'App.tsx',                    type:'core',     x:490, y:235, w:200,
    sub:'router & state hub',
    detail:'Central orchestrator. Manages AppView routing state (landing, login, onboarding, mentor-onboarding, chat, dashboard, mentor-dashboard). Handles auth session via Better Auth, Firestore data persistence for savedSchools, discardedSchools, and applications. Lifts chat message state. Triggers loading transitions and profile analysis messaging.' },

  // ─ TIER 3: VIEWS ─────────────────────────────────── y=345
  { id:'landing',  label:'LandingPage',     file:'components/LandingPage.tsx', type:'view',     x:100, y:345,
    sub:'role-selection screen',
    detail:'Three-panel animated landing: Student, Mentor, University. Each panel expands flex on hover and collapses its siblings. Clicking a panel sets the selected role and navigates to LoginPage.' },
  { id:'login',    label:'LoginPage',       file:'components/LoginPage.tsx',   type:'view',     x:445, y:345,
    sub:'sign in / sign up',
    detail:'Handles both sign-in and sign-up flows using Better Auth client. Adapts UI based on selected role. Errors shown inline. Redirects to onboarding on first login or dashboard on return.' },
  { id:'loadscr',  label:'LoadingScreen',   file:'components/LoadingScreen.tsx',type:'view',    x:760, y:345,
    sub:'animated transition',
    detail:'Full-screen overlay with rotating loading messages (e.g. "Consulting global academic archives...", "Calibrating financial aid optimizations..."). Used during profile analysis and dashboard build transitions. Configurable message set passed as prop.' },

  // ─ TIER 4: FLOWS ─────────────────────────────────── y=465
  { id:'onboard',  label:'Onboarding',      file:'components/Onboarding.tsx',  type:'student',  x:30,  y:465,
    sub:'8-step profile builder',
    detail:'Multi-step wizard driven by ONBOARDING_STEPS constant. Collects: name, citizenship, degree level, field of study, preferred locations, budget range, key metrics (e.g. Academic Prestige, Research Facilities), campus vibe, and personal priorities. Writes completed UserProfile to Firestore on submit.' },
  { id:'chat',     label:'ChatInterface',   file:'components/ChatInterface.tsx',type:'student',  x:225, y:465,
    sub:'AI research chat',
    detail:'Main conversational UI. Streams Gemini responses character-by-character. Parses JSON university blocks embedded in AI replies and injects UniversityCard components inline. Displays Google Search citation sources beneath messages. Input supports multi-line. State (messages) is lifted to App.tsx for persistence.' },
  { id:'dash',     label:'Dashboard',       file:'components/Dashboard.tsx',   type:'student',  x:420, y:465,
    sub:'8-view command center',
    detail:'Largest component (67KB). Sidebar navigation with 8 views: Schools (save/discard swipe UI), Mentors directory (filterable), Chat (embedded ChatInterface), Scholarships, Application Tracker (Kanban), Forum (stub), Guides, Test Prep. Manages ApplicationFormModal for applying. Persists all state changes back to Firestore via App.tsx callbacks.' },
  { id:'mentor-on',label:'MentorOnboarding',file:'components/MentorOnboarding.tsx',type:'mentor',x:790, y:465,
    sub:'mentor profile creation',
    detail:'Onboarding flow for mentor accounts. Collects: university, major/role, bio, LinkedIn URL, availability toggle, and expertise tags. Validates all fields. Saves MentorProfile document to Firestore.' },
  { id:'mentor-db',label:'MentorDashboard', file:'components/MentorDashboard.tsx',type:'mentor', x:990, y:465,
    sub:'mentor profile & controls',
    detail:'Mentor-facing dashboard. Shows profile card with photo, bio, university, and tag list. Availability toggle updates Firestore. "Edit" button renders MentorOnboarding inside a modal overlay for in-place editing. Shows students guided count.' },

  // ─ TIER 5: SHARED COMPONENTS ─────────────────────── y=600
  { id:'unicard',  label:'UniversityCard',  file:'components/UniversityCard.tsx', type:'component', x:30,  y:600,
    sub:'university recommendation',
    detail:'Renders one university recommendation. Fields: name, location, matchScore (shown as %), tuition, description, tags, and action buttons (Save to Dashboard, Discard, Visit Website). Used in Dashboard schools grid and injected inline into ChatInterface message bubbles by MessageBubble.' },
  { id:'appform',  label:'ApplicationFormModal', file:'components/ApplicationFormModal.tsx',type:'component',x:220,y:600,
    sub:'4-step application form',
    detail:'Full-screen modal overlay. 4 steps with progress bar: (1) Personal Info — name, email, phone, address; (2) Academic — GPA, major; (3) Essay — free text; (4) Review & Submit. Supports both university and scholarship applications. currentStep and progress (0–100) saved back to the Application record in Firestore.' },
  { id:'editprof', label:'EditProfileModal',file:'components/EditProfileModal.tsx', type:'component', x:430, y:600,
    sub:'student profile editor',
    detail:'Modal for editing UserProfile post-onboarding. Allows updating field of study, budget range, preferred locations, key metrics, vibe, and priorities. Changes re-tunes the AI system prompt the next time the chat session is initialised, improving recommendation quality.' },
  { id:'msgbubble',label:'MessageBubble',   file:'components/MessageBubble.tsx', type:'component', x:640, y:600,
    sub:'chat message renderer',
    detail:'Renders a single ChatMessage. Uses react-markdown for rich text formatting of AI replies. Extracts ```json blocks from AI text, parses University arrays, and renders inline UniversityCard components. Displays GroundingSource citation links from Google Search beneath the message. Also renders the typing indicator (LoadingDots) for pending messages.' },
  { id:'loadots',  label:'LoadingDots',     file:'components/LoadingDots.tsx',   type:'component', x:850, y:600,
    sub:'typing indicator',
    detail:'Three CSS-animated bouncing dots. Displayed inside ChatInterface while the Gemini API is processing a response. Pure CSS @keyframes animation with staggered delays.' },

  // ─ TIER 6: SERVICES & CONFIG ──────────────────────── y=725
  { id:'geminisvc',label:'geminiService.ts',file:'services/geminiService.ts',  type:'service',  x:30,  y:725,
    sub:'AI session & prompting',
    detail:'Manages the Gemini 2.5 Flash chat session lifecycle. createSystemInstruction() builds a detailed system prompt from UserProfile (name, citizenship, degree, field, budget, locations, key metrics, vibe, priorities). initializeChatSession() creates a persistent Chat object with Google Search grounding enabled. generateWelcomeMessage() runs a one-shot call to produce a personalised greeting.' },
  { id:'authlib',  label:'auth.ts',          file:'lib/auth.ts',               type:'service',  x:230, y:725,
    sub:'Better Auth client',
    detail:'Configures the Better Auth client. Exports authClient with useSession() React hook for reading the current session, and methods for signIn.email(), signUp.email(), and signOut(). Integrated with Firebase Auth as the underlying identity provider.' },
  { id:'firebase', label:'firebase.ts',      file:'firebase.ts',               type:'service',  x:435, y:725,
    sub:'Firebase initialisation',
    detail:'Initialises the Firebase app with config from env vars (FIREBASE_* prefixed) with fallback to firebase-applet-config.json. Exports: auth (Firebase Auth instance used by Better Auth), db (Firestore instance, supports custom FIREBASE_FIRESTORE_DATABASE_ID). Logs diagnostic info about key validity on startup.' },
  { id:'constants',label:'constants.ts',     file:'constants.ts',              type:'config',   x:640, y:725,
    sub:'static app data',
    detail:'Largest static data file. Exports: ONBOARDING_STEPS (8 OnboardingQuestion definitions with type, options, and subtext), MOCK_MENTORS, MOCK_DATABASE_UNIVERSITIES, AUTOCOMPLETE_UNIVERSITIES (full-text search list), MOCK_SCHOLARSHIPS, MOCK_GUIDES, and UNI_IMAGES (university name → image URL map).' },
  { id:'types',    label:'types.ts',          file:'types.ts',                 type:'config',   x:850, y:725,
    sub:'TypeScript interfaces',
    detail:'Source of truth for all shared types. Exports: AuthUser, UserProfile, MentorProfile, University, Application (with ApplicationStatus), Scholarship, Mentor, Guide, ChatMessage, ChatState, GroundingSource, OnboardingQuestion.' },

  // ─ TIER 7: EXTERNAL APIS ──────────────────────────── y=855
  { id:'gemini-api',  label:'Google Gemini API', file:null, type:'external', x:30,  y:855,
    sub:'LLM — Gemini 2.5 Flash',
    detail:'Google Gemini 2.5 Flash. Powers all AI research chat with low-latency streaming responses. Has Google Search grounding enabled, allowing it to retrieve real-time university data. Accessed via @google/genai SDK (ai.chats.create with persistent Chat session).' },
  { id:'gsearch',     label:'Google Search',      file:null, type:'external', x:230, y:855,
    sub:'live data grounding',
    detail:'Google Search tool registered as a Gemini tool. Allows the AI to retrieve current university info, admission rates, tuition, and campus reviews from the web. Returns cited GroundingSource URLs shown beneath AI messages.' },
  { id:'fb-auth',     label:'Firebase Auth',       file:null, type:'external', x:480, y:855,
    sub:'identity provider',
    detail:'Firebase Authentication service. Manages user credentials, session tokens, and email/password identity. Integrated with Better Auth client. UID is used as the Firestore document ID for per-user data.' },
  { id:'firestore',   label:'Cloud Firestore',     file:null, type:'external', x:740, y:855,
    sub:'NoSQL database',
    detail:'Firebase Firestore. Per-user data stored at /users/{userId}: profile (UserProfile), savedSchools, discardedSchools, applications (Application[]), and mentor profile fields. Secured by firestore.rules. Accessed via firebase/firestore (doc, getDoc, setDoc).' },
];

// Connections [fromId, toId]
const EDGES = [
  ['html','main'],['main','app'],
  ['app','landing'],['app','login'],['app','loadscr'],
  ['app','onboard'],['app','chat'],['app','dash'],['app','mentor-on'],['app','mentor-db'],
  ['app','firebase'],['app','authlib'],
  ['onboard','chat'],['chat','dash'],
  ['mentor-on','mentor-db'],
  ['chat','geminisvc'],['chat','msgbubble'],['chat','loadots'],
  ['dash','unicard'],['dash','appform'],['dash','editprof'],
  ['msgbubble','unicard'],
  ['geminisvc','gemini-api'],['geminisvc','gsearch'],
  ['authlib','fb-auth'],
  ['firebase','fb-auth'],['firebase','firestore'],
];

// Build node map
const NMAP = {};
NODES.forEach(n => NMAP[n.id] = n);

// Render tier separators and labels
const TIERS = [
  { y:15,  label:'Build Config' },
  { y:122, label:'Entry' },
  { y:226, label:'App Core' },
  { y:335, label:'Views' },
  { y:453, label:'User Flows' },
  { y:588, label:'UI Components' },
  { y:713, label:'Services / Config' },
  { y:843, label:'External APIs' },
];

const canvas = document.getElementById('canvas');

TIERS.forEach(t => {
  const line = document.createElement('div');
  line.className = 'tier-line';
  line.style.top = t.y + 'px';
  canvas.appendChild(line);

  const lbl = document.createElement('div');
  lbl.className = 'tier-tag';
  lbl.textContent = t.label;
  lbl.style.top = (t.y + 6) + 'px';
  canvas.appendChild(lbl);
});

// Flow group brackets
const groups = [
  { x:22, y:455, w:600, h:76, color:'#06b6d4', label:'Student flow' },
  { x:782, y:455, w:382, h:76, color:'#a855f7', label:'Mentor flow' },
];
groups.forEach(g => {
  const el = document.createElement('div');
  el.className = 'flow-group';
  el.style.cssText = `left:${g.x}px;top:${g.y}px;width:${g.w}px;height:${g.h}px;border-color:${g.color}44;`;
  const lbl = document.createElement('div');
  lbl.className = 'flow-group-label';
  lbl.textContent = g.label;
  lbl.style.cssText = `color:${g.color};background:var(--bg);font-size:8.5px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;`;
  el.appendChild(lbl);
  canvas.appendChild(el);
});

// Render nodes
NODES.forEach(n => {
  const color = TC[n.type].hex;
  const el = document.createElement('div');
  el.className = 'node' + (n.w ? ' wide' : '') + (n.type === 'external' ? ' external' : '');
  el.id = 'n-' + n.id;
  el.style.cssText = `left:${n.x}px;top:${n.y}px;${n.w?'width:'+n.w+'px;':''}--nc:${color}`;
  el.innerHTML = `<div class="node-badge">${TC[n.type].label}</div><div class="node-name">${n.label}</div><div class="node-sub">${n.sub}</div>`;
  el.addEventListener('click', () => selectNode(n.id));
  canvas.appendChild(el);
});

// Node geometry helpers
function nodeRect(id) {
  const n = NMAP[id];
  return { x: n.x, y: n.y, w: n.w || 160, h: 57 };
}
function nodeBottom(id) {
  const r = nodeRect(id);
  return { x: r.x + r.w/2, y: r.y + r.h };
}
function nodeTop(id) {
  const r = nodeRect(id);
  return { x: r.x + r.w/2, y: r.y };
}

// Draw SVG edges
function drawEdges(highlight) {
  const svg = document.getElementById('svg-overlay');
  svg.innerHTML = `<defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L9 5L2 9" fill="none" stroke="context-stroke" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>`;

  EDGES.forEach(([a, b]) => {
    const from = nodeBottom(a);
    const to = nodeTop(b);
    const isActive = highlight && (highlight === a || highlight === b);
    const isDim = highlight && !isActive;

    const dy = to.y - from.y;
    const cp1x = from.x;
    const cp1y = from.y + Math.max(dy * 0.45, 20);
    const cp2x = to.x;
    const cp2y = to.y - Math.max(dy * 0.45, 20);

    const color = TC[NMAP[a].type].hex;
    const opacity = isDim ? 0.06 : (isActive ? 0.9 : 0.28);
    const width = isActive ? 2 : 1.2;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${from.x},${from.y} C${cp1x},${cp1y} ${cp2x},${cp2y} ${to.x},${to.y}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', width);
    path.setAttribute('opacity', opacity);
    path.setAttribute('marker-end','url(#ah)');
    if (isActive) {
      path.classList.add('conn-path','flowing');
    }
    path.setAttribute('data-from', a);
    path.setAttribute('data-to', b);
    svg.appendChild(path);
  });
}

drawEdges(null);

// Selection
let active = null;

function selectNode(id) {
  if (active === id) { clearSelection(); return; }
  active = id;

  document.querySelectorAll('.node').forEach(el => el.classList.remove('active'));
  document.getElementById('n-' + id)?.classList.add('active');
  drawEdges(id);

  const n = NMAP[id];
  const color = TC[n.type].hex;

  document.getElementById('p-path').textContent = n.file || '— external service —';
  document.getElementById('p-title').textContent = n.label;

  const badge = document.getElementById('p-badge');
  badge.textContent = TC[n.type].label;
  badge.style.background = color + '22';
  badge.style.color = color;
  badge.style.border = `1px solid ${color}44`;

  document.getElementById('p-desc').textContent = n.detail;

  // Connections
  const connected = EDGES.filter(([a,b]) => a === id || b === id).map(([a,b]) => {
    const otherId = a === id ? b : a;
    const dir = a === id ? '→' : '←';
    const other = NMAP[otherId];
    return other ? { ...other, dir } : null;
  }).filter(Boolean);

  const connHead = document.getElementById('p-conn-head');
  const connContainer = document.getElementById('p-conn');
  if (connected.length) {
    connHead.style.display = 'block';
    connContainer.innerHTML = connected.map(c => `
      <div class="conn-row">
        <div class="conn-dot" style="background:${TC[c.type].hex}"></div>
        <span class="conn-dir" style="color:${TC[c.type].hex}">${c.dir}</span>
        <span class="conn-name" style="color:${TC[c.type].hex}">${c.label}</span>
      </div>`).join('');
  } else {
    connHead.style.display = 'none';
    connContainer.innerHTML = '<div class="empty-state">no direct connections</div>';
  }

  const panel = document.getElementById('panel');
  panel.classList.remove('closed');
}

function clearSelection() {
  active = null;
  document.querySelectorAll('.node').forEach(el => el.classList.remove('active'));
  drawEdges(null);
  document.getElementById('panel').classList.add('closed');
}

document.getElementById('panel-close').addEventListener('click', clearSelection);

// Click on canvas bg to deselect
canvas.addEventListener('click', e => {
  if (e.target === canvas || e.target.id === 'svg-overlay') clearSelection();
});
</script>
</body>
</html>
